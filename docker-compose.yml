services:
  mongo:
    image: mongo:7
    container_name: iptv-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: iptv-backend
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/iptv_reseller
      - JWT_SECRET=replace_with_real_secret
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_DISABLE_SIGNIN: "true"
    container_name: iptv-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
